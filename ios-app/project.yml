name: ManifestAndMatch
options:
  bundleIdPrefix: com.manifestandmatch
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  developmentLanguage: en
  createIntermediateGroups: true

packages:
  AppShell:
    path: Packages/AppShell

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_BITCODE: NO
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym

targets:
  ManifestAndMatch:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    bundleId: com.manifestandmatch.app
    sources:
      - path: ManifestAndMatch
    settings:
      base:
        PRODUCT_NAME: ManifestAndMatch
        PRODUCT_BUNDLE_IDENTIFIER: com.manifestandmatch.app
        MARKETING_VERSION: "1.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: YES
        DEVELOPMENT_TEAM: 5U9GNHH75M
    dependencies:
      - package: AppShell
        product: AppShell
    info:
      path: ManifestAndMatch/Info.plist
      properties:
        CFBundleDisplayName: Manifest & Match
        CFBundleShortVersionString: "1.1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSLocationWhenInUseUsageDescription: "Used to find jobs near you"
        NSPhotoLibraryUsageDescription: "Used to upload your resume"
        NSCameraUsageDescription: "Used to scan documents"
